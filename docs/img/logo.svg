<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 500">
    <!--
    Rust-themed logo for libspot-rs
    Based on the original libspot logo: https://github.com/asiffer/libspot/blob/master/docs/img/logo.svg
    -->

    <defs>
        <!-- Simple Rust gradient for the main shape -->
        <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ce422b;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#a72145;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#8e2f42;stop-opacity:1" />
        </linearGradient>

        <!-- Mask to clip rust effects to the main shape -->
        <mask id="shapeMask">
            <path fill="white"
                d="M 200.32 105.001 C 256.528 134.331 232.16 81.982 200.957 72.486 C 169.754 62.991 106.292 72.851 125.943 131.906 C 145.593 190.963 220.888 266.401 225.447 292.871 C 230.005 319.341 229.245 331.501 213.293 352.962 C 197.342 374.424 176.075 389.448 155.566 386.586 C 135.058 383.724 135.058 353.678 138.857 336.508 C 142.655 319.341 172.733 287.383 188.654 275.302 C 204.574 263.222 286.212 198.44 339.38 204.877 C 392.55 211.314 405.463 237.07 411.54 215.608 C 417.616 194.147 371.587 177.295 350.409 175.465 C 329.232 173.636 278.253 177.926 238.298 198.236 C 199.188 218.117 117.588 279.278 100.119 311.471 C 82.65 343.664 84.167 389.448 103.155 410.91 C 122.144 432.371 164.682 440.241 205.698 414.486 C 246.714 388.731 255.877 365.812 262.665 350.101 C 269.378 334.562 269.835 294.3 259.475 271.288 C 249.115 248.277 174.556 144.784 169.998 132.624 C 165.441 120.462 144.113 75.67 200.32 105.001 Z" />
        </mask>
    </defs>

    <!-- Simple background with subtle Rust tint -->
    <rect x="0" y="0" width="500" height="500" fill="#fdf6e3" rx="50" />

    <!-- Main S-shaped path with Rust gradient - preserving original shape -->
    <path fill="url(#rustGradient)" id="main"
        d="M 200.32 105.001 C 256.528 134.331 232.16 81.982 200.957 72.486 C 169.754 62.991 106.292 72.851 125.943 131.906 C 145.593 190.963 220.888 266.401 225.447 292.871 C 230.005 319.341 229.245 331.501 213.293 352.962 C 197.342 374.424 176.075 389.448 155.566 386.586 C 135.058 383.724 135.058 353.678 138.857 336.508 C 142.655 319.341 172.733 287.383 188.654 275.302 C 204.574 263.222 286.212 198.44 339.38 204.877 C 392.55 211.314 405.463 237.07 411.54 215.608 C 417.616 194.147 371.587 177.295 350.409 175.465 C 329.232 173.636 278.253 177.926 238.298 198.236 C 199.188 218.117 117.588 279.278 100.119 311.471 C 82.65 343.664 84.167 389.448 103.155 410.91 C 122.144 432.371 164.682 440.241 205.698 414.486 C 246.714 388.731 255.877 365.812 262.665 350.101 C 269.378 334.562 269.835 294.3 259.475 271.288 C 249.115 248.277 174.556 144.784 169.998 132.624 C 165.441 120.462 144.113 75.67 200.32 105.001 Z">
    </path>

    <!-- Rust texture overlay - clipped to the shape -->
    <g mask="url(#shapeMask)" opacity="0.3">
        <!-- Rust spots -->
        <circle cx="180" cy="110" r="15" fill="#8b4513" opacity="0.4"/>
        <circle cx="215" cy="95" r="10" fill="#704214" opacity="0.5"/>
        <circle cx="160" cy="130" r="8" fill="#5d3410" opacity="0.3"/>

        <circle cx="190" cy="250" r="12" fill="#8b4513" opacity="0.4"/>
        <circle cx="220" cy="280" r="18" fill="#704214" opacity="0.3"/>

        <circle cx="340" cy="205" r="14" fill="#5d3410" opacity="0.4"/>
        <circle cx="355" cy="190" r="9" fill="#8b4513" opacity="0.3"/>

        <circle cx="150" cy="360" r="11" fill="#704214" opacity="0.4"/>
        <circle cx="170" cy="375" r="16" fill="#5d3410" opacity="0.3"/>

        <circle cx="105" cy="310" r="13" fill="#8b4513" opacity="0.4"/>

        <!-- Larger patches -->
        <ellipse cx="200" cy="200" rx="25" ry="15" fill="#8b4513" opacity="0.2" transform="rotate(45 200 200)"/>
        <ellipse cx="260" cy="320" rx="20" ry="10" fill="#704214" opacity="0.25" transform="rotate(-30 260 320)"/>
    </g>

    <!-- Edge darkening for depth -->
    <g mask="url(#shapeMask)" opacity="0.15">
        <path fill="#3d1f1c"
            d="M 200.32 105.001 C 256.528 134.331 232.16 81.982 200.957 72.486 C 169.754 62.991 106.292 72.851 125.943 131.906 C 145.593 190.963 220.888 266.401 225.447 292.871 C 230.005 319.341 229.245 331.501 213.293 352.962 C 197.342 374.424 176.075 389.448 155.566 386.586 C 135.058 383.724 135.058 353.678 138.857 336.508 C 142.655 319.341 172.733 287.383 188.654 275.302 C 204.574 263.222 286.212 198.44 339.38 204.877 C 392.55 211.314 405.463 237.07 411.54 215.608 C 417.616 194.147 371.587 177.295 350.409 175.465 C 329.232 173.636 278.253 177.926 238.298 198.236 C 199.188 218.117 117.588 279.278 100.119 311.471 C 82.65 343.664 84.167 389.448 103.155 410.91 C 122.144 432.371 164.682 440.241 205.698 414.486 C 246.714 388.731 255.877 365.812 262.665 350.101 C 269.378 334.562 269.835 294.3 259.475 271.288 C 249.115 248.277 174.556 144.784 169.998 132.624 C 165.441 120.462 144.113 75.67 200.32 105.001 Z"
            transform="translate(3,3)">
        </path>
    </g>
</svg>
